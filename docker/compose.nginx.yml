# compose.nginx.yml — Reverse proxy Nginx
# Espone il traffico su porta 80. Instrada verso lo stack attivo (blue o green)
# tramite il file conf.d/active.conf (bind-mount writeable).
#
# Il bind-mount su conf.d/ è OBBLIGATORIO per il funzionamento di switch e rollback.
# I file host in docker/nginx/conf.d/ vengono modificati dagli script e
# Nginx li ricarica con: docker exec nginx nginx -s reload
#
# Avvio:  docker compose -f docker/compose.nginx.yml up -d
# Stop:   docker compose -f docker/compose.nginx.yml down

version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      # nginx.conf in sola lettura — non viene modificato a runtime
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # conf.d/ in lettura/scrittura — switch-blue-green.sh modifica active.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
    networks:
      - zenithstore-network
    restart: unless-stopped

networks:
  zenithstore-network:
    external: true
    name: zenithstore-network

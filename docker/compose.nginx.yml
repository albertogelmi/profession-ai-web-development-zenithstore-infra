# compose.nginx.yml — Reverse proxy Nginx
# Espone il traffico su porta 80. Instrada verso lo stack attivo (blue o green)
# tramite il file conf.d/active.conf nel volume condiviso zenithstore-nginx-conf.
#
# Il volume zenithstore-nginx-conf è condiviso con Jenkins (montato in /nginx-conf).
# Questo consente agli script di switch/rollback, eseguiti dentro Jenkins,
# di aggiornare active.conf senza dipendere da path host.
#
# ⚠️  Prima del primo avvio inizializzare il volume:
#   docker volume create zenithstore-nginx-conf
#   docker run --rm -v "${PWD}/docker/nginx/conf.d:/src:ro" -v zenithstore-nginx-conf:/dest alpine sh -c "cp /src/* /dest/"
#
# Avvio:  docker compose -f docker/compose.nginx.yml up -d
# Stop:   docker compose -f docker/compose.nginx.yml down

version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      # nginx.conf in sola lettura — non viene modificato a runtime
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # conf.d/ — volume condiviso con Jenkins per aggiornare active.conf a runtime
      - zenithstore-nginx-conf:/etc/nginx/conf.d
    networks:
      - zenithstore-network
    restart: unless-stopped

networks:
  zenithstore-network:
    external: true
    name: zenithstore-network

volumes:
  zenithstore-nginx-conf:
    external: true
    name: zenithstore-nginx-conf

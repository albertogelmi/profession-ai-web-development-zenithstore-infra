# compose.blue.yml — Stack Blue (BE + FE)
# Stack ATTIVO di default (host ports 3000/3001).
#
# Avvio:  IMAGE_TAG=<sha> JWT_SECRET=... docker compose -f docker/compose.blue.yml up -d
# Stop:   docker compose -f docker/compose.blue.yml down
#
# La network zenithstore-network deve essere già attiva (docker-compose.yml nel repo app).

version: '3.8'

services:
  be-blue:
    image: zenithstore-backend:${IMAGE_TAG:-latest}
    container_name: be-blue
    ports:
      - "3000:3000"   # host:container — porta host usata da Nginx e da healthcheck.sh
    environment:
      NODE_ENV: staging
      PORT: "3000"
      # ─── MySQL ───────────────────────────────────────
      DB_HOST: mysql-zenithstore
      DB_PORT: "3306"
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: zenithstore
      SYNC: "false"
      LOGGING: "false"
      # ─── MongoDB ─────────────────────────────────────
      MONGODB_URI: "mongodb://admin:${MONGO_PASSWORD}@mongodb-zenithstore:27017/zenithstore?authSource=admin"
      # ─── JWT ─────────────────────────────────────────
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: "9h"
      # ─── Security ────────────────────────────────────
      ALLOWED_DOMAIN: localhost
      CORS_ORIGIN: "http://localhost"
      # ─── Rate Limiting ────────────────────────────────
      RATE_LIMIT_WINDOW_MS: "900000"
      RATE_LIMIT_MAX_REQUESTS: "500"
      # ─── Jobs ────────────────────────────────────────
      CART_CLEANUP_INTERVAL_MINUTES: "10"
      CART_EXPIRATION_HOURS: "24"
      RESERVED_EXPIRATION_HOURS: "3"
      CART_GRACE_PERIOD_MINUTES: "15"
    networks:
      - zenithstore-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  fe-blue:
    image: zenithstore-frontend:${IMAGE_TAG:-latest}
    container_name: fe-blue
    ports:
      - "3001:3001"   # host:container
    environment:
      NODE_ENV: staging
      PORT: "3001"
      HOSTNAME: "0.0.0.0"
      # ─── NextAuth ────────────────────────────────────
      NEXTAUTH_URL: "http://localhost"
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_SESSION_MAX_AGE_HOURS: "9"
      # ─── Backend proxy (server-side — sovrascrive il valore build-time) ──
      # Il proxy handler Next.js legge questa variabile a runtime lato server.
      # Il client browser usa il valore baked-in (http://localhost via Nginx).
      NEXT_PUBLIC_BACKEND_URL: "http://be-blue:3000"
      NEXT_PUBLIC_WS_URL: "ws://localhost"   # browser → Nginx → be-blue (baked at build)
      # ─── JWT ─────────────────────────────────────────
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: "9h"
      # ─── Cart ────────────────────────────────────────
      NEXT_PUBLIC_CART_EXPIRATION_HOURS: "24"
      NEXT_PUBLIC_DEBUG_LOGS: "false"
      NEXT_PUBLIC_INFO_LOGS: "true"
    networks:
      - zenithstore-network
    depends_on:
      be-blue:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3001/api/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

networks:
  zenithstore-network:
    external: true
    name: zenithstore-network

# compose.blue.yml — Stack Blue (BE + FE)
# Stack ATTIVO di default (host ports 3000/3001).
#
# Avvio:  IMAGE_TAG=<sha> JWT_SECRET=... docker compose -f docker/compose.blue.yml up -d
# Stop:   docker compose -f docker/compose.blue.yml down
#
# La network zenithstore-network deve essere già attiva (compose.db.yml deve essere già avviato).

version: '3.8'

services:
  be-blue:
    image: zenithstore-backend:${IMAGE_TAG:-latest}
    container_name: be-blue
    ports:
      - "3000:3000"   # host:container — porta host usata da Nginx e da healthcheck.sh
    environment:
      PORT: "3000"
      # ─── MySQL ───────────────────────────────────────
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: "${DB_PORT:-3306}"
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE:-zenithstore}
      SYNC: "false"
      LOGGING: "false"
      # ─── MongoDB ─────────────────────────────────────
      MONGODB_URI: "mongodb://${MONGO_USERNAME:-admin}:${MONGO_PASSWORD}@${MONGO_HOST:-mongodb}:${MONGO_PORT:-27017}/${MONGO_DATABASE:-zenithstore}?authSource=admin"
      # ─── JWT ─────────────────────────────────────────
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: "${JWT_EXPIRES_IN:-9h}"
      # ─── Security ────────────────────────────────────
      ALLOWED_DOMAIN: ${APP_DOMAIN:-localhost}
      CORS_ORIGIN: "${CORS_ORIGIN:-http://localhost,http://localhost:3000,http://localhost:3001}"
      # ─── Rate Limiting ───────────────────────────────
      RATE_LIMIT_WINDOW_MS: "${RATE_LIMIT_WINDOW_MS:-900000}"
      RATE_LIMIT_MAX_REQUESTS: "${RATE_LIMIT_MAX_REQUESTS:-1000}"
      # ─── Logging ──────────────────────────────────────────────
      ACCESS_LOG_FILE_NAME: access.log
      ERROR_LOG_FILE_NAME: errors.log
      # ─── Jobs ────────────────────────────────────────
      CART_CLEANUP_INTERVAL_MINUTES: "${CART_CLEANUP_INTERVAL_MINUTES:-10}"
      CART_EXPIRATION_HOURS: "${CART_EXPIRATION_HOURS:-24}"
      RESERVED_EXPIRATION_HOURS: "${RESERVED_EXPIRATION_HOURS:-3}"
      CART_GRACE_PERIOD_MINUTES: "${CART_GRACE_PERIOD_MINUTES:-15}"
    networks:
      - zenithstore-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  fe-blue:
    image: zenithstore-frontend:${IMAGE_TAG:-latest}
    container_name: fe-blue
    ports:
      - "3001:3001"   # host:container
    environment:
      # ─── NextAuth ────────────────────────────────────
      NEXTAUTH_URL: "${APP_URL:-http://localhost}"
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_SESSION_MAX_AGE_HOURS: "${AUTH_SESSION_MAX_AGE_HOURS:-9}"
      # ─── Backend API ─────────────────────────────────
      BACKEND_INTERNAL_URL: "http://be-blue:3000"   # Docker service name — non modificare
      NEXT_PUBLIC_BACKEND_URL: "${APP_URL:-http://localhost}"
      AUTH_TRUST_HOST: "true"
      # ─── JWT ─────────────────────────────────────────
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: "${JWT_EXPIRES_IN:-9h}"
      # ─── Cart ────────────────────────────────────────
      NEXT_PUBLIC_CART_EXPIRATION_HOURS: "${CART_EXPIRATION_HOURS:-24}"
      # ─── Logging ─────────────────────────────────────
      NEXT_PUBLIC_DEBUG_LOGS: "${NEXT_PUBLIC_DEBUG_LOGS:-false}"
      NEXT_PUBLIC_INFO_LOGS: "${NEXT_PUBLIC_INFO_LOGS:-true}"
      # ─── OAuth ───────────────────────────────────────
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-mock-google-client-id}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-mock-google-client-secret}
    networks:
      - zenithstore-network
    depends_on:
      be-blue:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3001/api/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

networks:
  zenithstore-network:
    external: true
    name: zenithstore-network

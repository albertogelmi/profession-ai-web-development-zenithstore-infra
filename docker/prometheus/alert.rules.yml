groups:
  - name: zenithstore_alerts
    rules:

      # ── Latency ────────────────────────────────────────────────────────────
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95,
            rate(http_request_duration_seconds_bucket[5m])
          ) > 2
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Alta latency su {{ $labels.job }}"
          description: >
            Il 95° percentile della latency su {{ $labels.job }} è
            {{ $value | humanizeDuration }} (soglia: 2s) da più di 2 minuti.

      # ── Error Rate ─────────────────────────────────────────────────────────
      - alert: HighErrorRate
        expr: |
          rate(http_errors_total[5m])
          /
          rate(http_requests_total[5m]) > 0.05
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Alto error rate su {{ $labels.job }}"
          description: >
            L'error rate su {{ $labels.job }} è {{ $value | humanizePercentage }}
            (soglia: 5%) nell'ultimo minuto.

      # ── Backend Down ───────────────────────────────────────────────────────
      - alert: BackendDown
        expr: up{job=~"zenithstore-backend.*"} == 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Backend non raggiungibile: {{ $labels.job }}"
          description: >
            Prometheus non riesce a fare scrape di {{ $labels.job }}.
            Il backend potrebbe essere down o il container non in esecuzione.

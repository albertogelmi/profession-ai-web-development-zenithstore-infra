# compose.green.yml — Stack Green (BE + FE)
# Stack IDLE di default (host ports 3010/3011).
#
# Nota porte: le porte CONTAINER sono sempre 3000 (BE) e 3001 (FE).
# Le porte HOST differiscono per permettere la coesistenza con lo stack blue:
#   be-green: host 3010 → container 3000
#   fe-green: host 3011 → container 3001
# Nginx si connette via Docker network usando le porte container (3000/3001),
# non le porte host. Le porte host servono solo per healthcheck da Jenkins.
#
# Avvio:  IMAGE_TAG=<sha> JWT_SECRET=... docker compose -f docker/compose.green.yml up -d
# Stop:   docker compose -f docker/compose.green.yml down

version: '3.8'

services:
  be-green:
    image: zenithstore-backend:${IMAGE_TAG:-latest}
    container_name: be-green
    ports:
      - "3010:3000"   # host 3010 → container 3000
    environment:
      PORT: "3000"
      # ─── MySQL ───────────────────────────────────────
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: zenithstore
      SYNC: "false"
      LOGGING: "false"
      # ─── MongoDB ─────────────────────────────────────
      MONGODB_URI: "mongodb://admin:${MONGO_PASSWORD}@mongodb:27017/zenithstore?authSource=admin"
      # ─── JWT ─────────────────────────────────────────
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: "9h"
      # ─── Security ────────────────────────────────────
      ALLOWED_DOMAIN: localhost
      CORS_ORIGIN: "http://localhost:3010,http://localhost:3011"
      # ─── Rate Limiting ───────────────────────────────
      RATE_LIMIT_WINDOW_MS: "900000"
      RATE_LIMIT_MAX_REQUESTS: "1000"
      # ─── Logging ──────────────────────────────────────────────
      ACCESS_LOG_FILE_NAME: access.log
      ERROR_LOG_FILE_NAME: errors.log
      # ─── Jobs ────────────────────────────────────────
      CART_CLEANUP_INTERVAL_MINUTES: "10"
      CART_EXPIRATION_HOURS: "24"
      RESERVED_EXPIRATION_HOURS: "3"
      CART_GRACE_PERIOD_MINUTES: "15"
    networks:
      - zenithstore-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  fe-green:
    image: zenithstore-frontend:${IMAGE_TAG:-latest}
    container_name: fe-green
    ports:
      - "3011:3001"   # host 3011 → container 3001
    environment:
      # ─── NextAuth ────────────────────────────────────
      NEXTAUTH_URL: "http://localhost:3011"
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_SESSION_MAX_AGE_HOURS: "9"
      # ─── Backend API ─────────────────────────────────
      BACKEND_INTERNAL_URL: "http://be-green:3000"
      NEXT_PUBLIC_BACKEND_URL: "http://localhost"
      AUTH_TRUST_HOST: "true"
      # ─── JWT ─────────────────────────────────────────
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: "9h"
      # ─── Cart ────────────────────────────────────────
      NEXT_PUBLIC_CART_EXPIRATION_HOURS: "24"
      # ─── Logging ─────────────────────────────────────
      NEXT_PUBLIC_DEBUG_LOGS: "false"
      NEXT_PUBLIC_INFO_LOGS: "true"
      # ─── OAuth ───────────────────────────────────────
      GOOGLE_CLIENT_ID: mock-google-client-id
      GOOGLE_CLIENT_SECRET: mock-google-client-secret
    networks:
      - zenithstore-network
    depends_on:
      be-green:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3001/api/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

networks:
  zenithstore-network:
    external: true
    name: zenithstore-network

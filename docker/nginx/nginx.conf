events {
    worker_connections 1024;
}

http {
    # active.conf definisce $be_host e $fe_host via map.
    # Lo switch Blue-Green riscrive questo file e fa reload: nginx -s reload
    include /etc/nginx/conf.d/active.conf;

    # Risoluzione DNS lazy tramite resolver Docker interno.
    # Con le variabili in proxy_pass, nginx risolve il nome ad ogni request
    # invece che allo startup — necessario per il pattern Blue-Green.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Timeout WebSocket: le connessioni WS long-lived richiedono timeout estesi
    proxy_read_timeout  3600s;
    proxy_send_timeout  3600s;

    server {
        listen 80;

        # ── WebSocket (Socket.io) ─────────────────────────────────────────────
        # DEVE precedere /api/ per evitare conflitti di routing.
        # Senza questi header l'Upgrade HTTP fallisce e Socket.io degrada a
        # long-polling (funziona ma con performance peggiori e no real-time).
        location /socket.io/ {
            proxy_pass         http://$be_host;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_cache_bypass $http_upgrade;
        }

        # ── API Backend ───────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://$be_host;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Health check backend (per Prometheus e debug) ─────────────────────
        location /health {
            proxy_pass         http://$be_host;
            proxy_set_header   Host $host;
        }

        # ── User interface pages (HTML statiche servite dal BE) ───────────────
        location /user-interface {
            proxy_pass         http://$be_host;
            proxy_set_header   Host $host;
        }

        # ── Frontend Next.js (catch-all) ──────────────────────────────────────
        location / {
            proxy_pass         http://$fe_host;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}

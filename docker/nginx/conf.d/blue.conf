# blue.conf — Upstream verso stack Blue
# I nomi be-blue/fe-blue sono i container_name nei compose files.
# Nginx li risolve via Docker DNS sulla rete zenithstore-network.
# Le porte 3000/3001 sono le porte CONTAINER (interne alla rete Docker).
# Stack Blue — upstream attivi: be-blue:3000 / fe-blue:3001
# Usato da nginx.conf tramite le variabili $be_host e $fe_host.
# Risoluzione DNS lazy via resolver 127.0.0.11 (non fallisce se i container non sono ancora up).
map $host $be_host { default "be-blue:3000"; }
map $host $fe_host { default "fe-blue:3001"; }

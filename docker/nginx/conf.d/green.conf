# green.conf — Upstream verso stack Green
# Le porte container sono sempre 3000/3001 (il software ascolta su quelle porte).
# Le porte host 3010/3011 servono SOLO per healthcheck da Jenkins/host.
# Nginx usa le porte container via Docker network — non le porte host.
# Stack Green — upstream attivi: be-green:3000 / fe-green:3001
# Usato da nginx.conf tramite le variabili $be_host e $fe_host.
# Risoluzione DNS lazy via resolver 127.0.0.11 (non fallisce se i container non sono ancora up).
map $host $be_host { default "be-green:3000"; }
map $host $fe_host { default "fe-green:3001"; }

# alertmanager.yml — Configurazione Alertmanager
# Tutte le impostazioni sensibili e specifiche dell'ambiente vengono lette
# da variabili d'ambiente, iniettate da Docker Compose (compose.monitoring.yml)
# che a sua volta le legge dal file .env nella root del repo infra.
#
# L'espansione è abilitata dal flag --config.expand-env nel compose.monitoring.yml.
# Questo flag è disponibile da Alertmanager >= 0.25.0.

global:
  smtp_smarthost:      '${SMTP_HOST}'
  smtp_from:           '${SMTP_FROM}'
  smtp_auth_username:  '${SMTP_USERNAME}'
  smtp_auth_password:  '${SMTP_PASSWORD}'
  smtp_require_tls:    true
  # Timeout globale per i receiver
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity', 'job']
  group_wait:      30s    # attendi prima di inviare il primo alert del gruppo
  group_interval:  5m     # attendi prima di inviare un nuovo alert per lo stesso gruppo
  repeat_interval: 12h    # re-invia se l'alert è ancora attivo dopo N ore
  receiver: 'team-email'

  # Route separata per i critical: nessuna attesa, immediato
  routes:
    - match:
        severity: critical
      group_wait: 0s
      receiver: 'team-email'

receivers:
  - name: 'team-email'
    email_configs:
      - to: '${ALERT_EMAIL_TO}'
        send_resolved: true
        headers:
          Subject: '[ZenithStore {{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'

inhibit_rules:
  # Sopprime i warning se c'è già un critical per lo stesso alertname
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'job']

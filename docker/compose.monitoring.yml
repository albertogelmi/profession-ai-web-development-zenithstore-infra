# compose.monitoring.yml — Stack di monitoring
# Avvia: Prometheus, Grafana, Alertmanager, Jenkins
#
# Avvio:  docker compose -f docker/compose.monitoring.yml up -d
# Stop:   docker compose -f docker/compose.monitoring.yml down
#
# Accesso:
#   Jenkins    http://localhost:8080
#   Prometheus http://localhost:9090
#   Grafana    http://localhost:3100  (admin / GRAFANA_PASSWORD)
#   Alertmgr   http://localhost:9093

version: '3.8'

services:

  jenkins:
    image: jenkins-custom    # build con: docker build -t jenkins-custom -f Dockerfile.jenkins .
    container_name: jenkins
    ports:
      - "8080:8080"
      - "50000:50000"   # JNLP agent port
    volumes:
      - jenkins_home:/var/jenkins_home
      # Monta il Docker named pipe di Windows per consentire docker commands dall'interno
      - //./pipe/docker_engine://./pipe/docker_engine
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - monitoring-network
      - zenithstore-network   # per raggiungere be-blue e be-green
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3100:3000"   # host 3100 → container 3000 (3000 è occupata dal BE)
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - monitoring-network
    depends_on:
      - prometheus
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    networks:
      - monitoring-network
    restart: unless-stopped

networks:
  monitoring-network:
    name: zenithstore-monitoring
  zenithstore-network:
    external: true
    name: zenithstore-network

volumes:
  jenkins_home:
  prometheus_data:
  grafana_data:
